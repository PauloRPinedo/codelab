<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detalhes do projeto — CodeLab Explorer">
  <title>Projeto — CodeLab Explorer</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="url(#lgd)"/><path d="M12 14L18 20L12 26" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="20" y1="26" x2="28" y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/><defs><linearGradient id="lgd" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#2563eb"/></linearGradient></defs></svg>
      <span>CodeLab <strong>Explorer</strong></span>
    </a>
    <div class="nav-search">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="search-input" placeholder="Buscar projetos..." autocomplete="off">
      <kbd class="search-kbd">⌘K</kbd>
      <div class="search-dropdown" id="search-dropdown"></div>
    </div>
    <ul class="nav-links">
      <li><a href="../index.html" class="nav-link" data-page="index.html">Início</a></li>
      <li><a href="projects.html" class="nav-link active" data-page="projects.html">Projetos</a></li>
      <li><a href="dashboard.html" class="nav-link" data-page="dashboard.html">Painel</a></li>
    </ul>
    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="user-menu" id="user-menu" style="display:none">
        <button class="user-avatar-btn" id="user-menu-btn">
          <div class="avatar-circle-sm" id="user-initials-nav">--</div>
          <span id="user-name-nav"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;opacity:.6"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="user-dropdown" id="user-dropdown">
          <div class="user-dropdown-header"><p id="dropdown-name">--</p><span id="dropdown-email">--</span></div>
          <a href="dashboard.html" class="user-dropdown-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Painel</a>
          <a href="profile.html" class="user-dropdown-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</a>
          <div class="user-dropdown-divider"></div>
          <div class="user-dropdown-item danger" id="nav-logout-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sair</div>
        </div>
      </div>
      <a href="login.html" class="btn btn-primary btn-sm" id="nav-login-btn">Entrar</a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="mobile-menu" id="mobile-menu">
  <ul class="mobile-nav-links">
    <li><a href="../index.html" class="mobile-link">Início</a></li>
    <li><a href="projects.html" class="mobile-link">Projetos</a></li>
    <li><a href="dashboard.html" class="mobile-link">Painel</a></li>
  </ul>
</div>

<!-- CONTEÚDO (injetado via JS) -->
<div id="detail-page-root" style="padding-top: var(--nav-h);">
  <!-- Skeleton loader -->
  <div id="detail-skeleton">
    <div class="skeleton" style="height:260px;margin-bottom:0;border-radius:0;"></div>
    <div class="container" style="padding-top:48px;">
      <div style="display:grid;grid-template-columns:1fr 300px;gap:36px;">
        <div>
          <div class="skeleton" style="height:40px;width:60%;margin-bottom:20px;border-radius:var(--radius-sm);"></div>
          <div class="skeleton" style="height:20px;margin-bottom:12px;border-radius:var(--radius-sm);"></div>
          <div class="skeleton" style="height:20px;width:80%;margin-bottom:12px;border-radius:var(--radius-sm);"></div>
          <div class="skeleton" style="height:20px;width:70%;border-radius:var(--radius-sm);"></div>
        </div>
        <div><div class="skeleton" style="height:200px;border-radius:var(--radius);"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/core.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const root = document.getElementById('detail-page-root');

  if (!id) { root.innerHTML = `<div class="container" style="padding-top:120px;"><div class="empty-state"><div class="empty-icon">📭</div><h3>Projeto não encontrado</h3><p>Nenhum ID de projeto foi fornecido.</p><a href="projects.html" class="btn btn-primary">Ver Projetos</a></div></div>`; return; }

  const res = await API.getProject(id);
  if (!res.ok) { root.innerHTML = `<div class="container" style="padding-top:120px;"><div class="empty-state"><div class="empty-icon">😕</div><h3>Projeto não encontrado</h3><p>${res.error}</p><a href="projects.html" class="btn btn-primary">Ver Projetos</a></div></div>`; return; }

  const p = res.data;
  document.title = `${p.title} — CodeLab Explorer`;
  const isSaved = API.isProjectSaved(p.id);
  const diffLabel = p.difficulty === 'beginner' ? 'Iniciante' : p.difficulty === 'intermediate' ? 'Intermediário' : 'Avançado';

  root.innerHTML = `
    <!-- Hero -->
    <div class="detail-hero" style="border-radius:0; margin-bottom:0;">
      <div class="detail-hero-overlay"></div>
      <div class="detail-hero-icon">${p.icon}</div>
      <div class="detail-hero-content">
        <div class="breadcrumb" style="margin-bottom:14px;">
          <a href="projects.html" style="color:rgba(255,255,255,.7);">Projetos</a>
          <span class="breadcrumb-sep" style="color:rgba(255,255,255,.4);">/</span>
          <span style="color:rgba(255,255,255,.9);">${escHtml(p.title)}</span>
        </div>
        <h1>${escHtml(p.title)}</h1>
        <div class="detail-hero-meta">
          <span class="badge badge-${p.difficulty}">${diffLabel}</span>
          <span style="color:rgba(255,255,255,.8); font-size:.88rem;">⏱ ${p.time}</span>
          <span style="color:rgba(255,255,255,.8); font-size:.88rem;">❤️ ${p.likes} curtidas</span>
        </div>
      </div>
    </div>

    <!-- Detail layout -->
    <div class="container">
      <div class="detail-layout">
        <!-- Main content -->
        <div>
          <!-- Tabs -->
          <div class="tabs" id="detail-tabs">
            <button class="tab-btn active" data-tab="overview">Visão Geral</button>
            <button class="tab-btn" data-tab="guide">Guia</button>
            <button class="tab-btn" data-tab="code">Código</button>
            <button class="tab-btn" data-tab="challenges">Desafios</button>
          </div>

          <!-- Overview -->
          <div class="tab-pane active" id="tab-overview">
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;">
              ${p.tags.map(t => `<span class="badge badge-primary">${t}</span>`).join('')}
            </div>
            <p style="color:var(--text-secondary);line-height:1.8;margin-bottom:20px;font-size:1rem;">${escHtml(p.desc)}</p>
            <h3 style="font-size:1rem;font-weight:700;margin-bottom:12px;">O Que Você Vai Construir</h3>
            <p style="color:var(--text-secondary);line-height:1.7;">${escHtml(p.build)}</p>
          </div>

          <!-- Guide -->
          <div class="tab-pane" id="tab-guide">
            ${p.guide.map((s, i) => `
              <div class="guide-step">
                <div class="guide-step-num">Passo ${i + 1}</div>
                <h4>${escHtml(s.t)}</h4>
                <p>${escHtml(s.d)}</p>
              </div>
            `).join('')}
          </div>

          <!-- Code -->
          <div class="tab-pane" id="tab-code">
            ${p.code.map(c => `
              <div class="code-snippet">
                <div class="code-snippet-header">
                  <span>${escHtml(c.file)}</span>
                  <button class="copy-btn" data-code="${encodeURIComponent(c.code)}">Copiar</button>
                </div>
                <pre><code class="language-${c.lang}">${escHtml(c.code)}</code></pre>
              </div>
            `).join('')}
          </div>

          <!-- Challenges -->
          <div class="tab-pane" id="tab-challenges">
            ${p.challenges.map(c => `
              <div class="challenge-card">
                <h4>🏆 ${escHtml(c.t)}</h4>
                <p>${escHtml(c.d)}</p>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- Sidebar -->
        <aside>
          <div class="detail-sidebar-card">
            <h3>Informações</h3>
            <div class="meta-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span>${p.time}</span>
            </div>
            <div class="meta-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              <span>${escHtml(p.prereqs)}</span>
            </div>
            <div class="meta-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              <span>${p.language.charAt(0).toUpperCase() + p.language.slice(1)}</span>
            </div>
          </div>

          <div class="detail-sidebar-card">
            <h3>Conceitos-Chave</h3>
            <ul class="concepts-list">
              ${p.concepts.map(c => `<li>${escHtml(c)}</li>`).join('')}
            </ul>
          </div>

          <div class="detail-sidebar-card sidebar-actions">
            <button class="btn btn-primary btn-block" id="like-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              Curtir
            </button>
            <button class="btn ${isSaved ? 'btn-secondary' : 'btn-ghost'} btn-block" id="save-btn">
              <svg viewBox="0 0 24 24" fill="${isSaved ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" class="btn-icon"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
              <span id="save-label">${isSaved ? 'Salvo ✓' : 'Salvar'}</span>
            </button>
            <button class="btn btn-ghost btn-block" id="share-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Compartilhar
            </button>
          </div>

          <div class="detail-sidebar-card" id="related-card">
            <h3>Projetos Relacionados</h3>
            <div id="related-list">Carregando...</div>
          </div>
        </aside>
      </div>
    </div>
  `;

  // Tabs
  document.querySelectorAll('#detail-tabs .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#detail-tabs .tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`)?.classList.add('active');
    });
  });

  // Copy buttons
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(decodeURIComponent(btn.dataset.code)).then(() => {
        btn.textContent = 'Copiado!';
        setTimeout(() => btn.textContent = 'Copiar', 2000);
        showToast('Código copiado! ✅', 'success');
      });
    });
  });

  // Highlight.js
  if (typeof hljs !== 'undefined') setTimeout(() => hljs.highlightAll(), 100);

  // Like
  document.getElementById('like-btn')?.addEventListener('click', () => {
    if (!API.isLoggedIn()) { showToast('Faça login para curtir.', 'info'); return; }
    showToast('Projeto curtido! ❤️', 'success');
  });

  // Save
  document.getElementById('save-btn')?.addEventListener('click', () => {
    if (!API.isLoggedIn()) { showToast('Faça login para salvar.', 'info'); return; }
    const saved = API.toggleSaveProject(p.id);
    const btn = document.getElementById('save-btn');
    const label = document.getElementById('save-label');
    btn.className = `btn ${saved ? 'btn-secondary' : 'btn-ghost'} btn-block`;
    btn.querySelector('svg').setAttribute('fill', saved ? 'currentColor' : 'none');
    label.textContent = saved ? 'Salvo ✓' : 'Salvar';
    showToast(saved ? 'Projeto salvo! 🔖' : 'Removido dos salvos.', saved ? 'success' : 'info');
  });

  // Share
  document.getElementById('share-btn')?.addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href).then(() => showToast('Link copiado! 🔗', 'info'));
  });

  // Related projects
  const relRes = await API.getProjects({ category: [p.category], limit: 3 });
  if (relRes.ok) {
    const related = relRes.data.projects.filter(x => x.id !== p.id).slice(0, 3);
    const relList = document.getElementById('related-list');
    if (relList) {
      relList.innerHTML = related.length
        ? related.map(r => `<a href="project-detail.html?id=${r.id}" class="related-item">${r.icon} <span>${escHtml(r.title)}</span></a>`).join('')
        : '<p style="color:var(--text-muted);font-size:.84rem;">Nenhum projeto relacionado.</p>';
    }
  }

  // User dropdown
  if (API.isAdmin()) { document.getElementById('admin-link')?.style && (document.getElementById('admin-link').style.display = 'flex'); }
  const u = API.getMe();
  if (u) {
    const dn = document.getElementById('dropdown-name'); if (dn) dn.textContent = u.name;
    const de = document.getElementById('dropdown-email'); if (de) de.textContent = u.email;
  }
});
</script>
</body>
</html>
